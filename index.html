<!DOCTYPE html>
<html lang="en">
<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>SwitchBored — Your Gaming Value, Everywhere You Play</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<style>
  :root{ --bg:#0E1320; --surface:#171D2B; --surface-2:#1F2738; --border:#2A3346;
    --text:#EAEDF5; --muted:#8B93A7; --faint:#5C6477; --gold:#F5C24B; --gold-dim:#C9912E;
    --gold-soft:rgba(245,194,75,.12); --green:#4FC58C; --red:#E5736B; --radius:14px; --shadow:0 10px 30px rgba(0,0,0,.35); }
  *{box-sizing:border-box} html,body{margin:0;padding:0}
  body{background:var(--bg);color:var(--text);font-family:'Inter',system-ui,sans-serif;line-height:1.5;-webkit-font-smoothing:antialiased;min-height:100vh;background-image:radial-gradient(1200px 600px at 80% -10%, rgba(245,194,75,.06), transparent 60%);}
  h1,h2,h3,h4{font-family:'Space Grotesk',sans-serif;letter-spacing:-.01em;margin:0}
  a{color:inherit} button{font-family:inherit;cursor:pointer;border:none}
  input,textarea,select{font-family:inherit}
  .wrap{max-width:1180px;margin:0 auto;padding:0 20px}
  header.topbar{position:sticky;top:0;z-index:50;background:rgba(14,19,32,.82);backdrop-filter:blur(10px);border-bottom:1px solid var(--border)}
  .topbar .wrap{display:flex;align-items:center;gap:16px;height:64px}
  .brand{display:flex;align-items:center;gap:10px;font-family:'Space Grotesk';font-weight:700;font-size:20px;cursor:pointer}
  .brand .dot{width:14px;height:14px;border-radius:50%;background:radial-gradient(circle at 30% 30%, #ffe9a8, var(--gold) 55%, var(--gold-dim));box-shadow:0 0 0 3px var(--gold-soft)}
  .grow{flex:1}
  .nav-link{color:var(--muted);font-weight:500;font-size:14px;background:none;padding:6px 4px} .nav-link:hover{color:var(--text)}
  .pending-badge{display:inline-flex;align-items:center;justify-content:center;background:var(--red);color:#fff;font-size:10px;font-weight:700;border-radius:99px;min-width:16px;height:16px;padding:0 4px;margin-left:4px;vertical-align:middle}
  .mg-chip{display:inline-flex;align-items:center;gap:8px;background:var(--gold-soft);border:1px solid rgba(245,194,75,.3);color:var(--gold);padding:6px 12px;border-radius:999px;font-weight:600;font-size:14px}
  .nav-greet{color:var(--muted);font-size:14px;font-weight:500} .nav-greet b{color:var(--text);font-weight:600}
  .mg-chip .coin{width:16px;height:16px;border-radius:50%;background:radial-gradient(circle at 32% 30%, #ffe9a8, var(--gold) 58%, var(--gold-dim));display:inline-flex;align-items:center;justify-content:center;color:#5c3d00;font-size:9px;font-weight:800}
  .mg-amt{font-family:'JetBrains Mono',monospace}
  .btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;padding:11px 18px;border-radius:10px;font-weight:600;font-size:14px;transition:.15s}
  .btn-gold{background:linear-gradient(180deg,#ffd874,var(--gold));color:#3a2700} .btn-gold:hover{filter:brightness(1.06);transform:translateY(-1px)}
  .btn-ghost{background:var(--surface-2);color:var(--text);border:1px solid var(--border)} .btn-ghost:hover{border-color:var(--gold-dim);color:var(--gold)}
  .btn-green{background:var(--green);color:#05291c} .btn-red{background:transparent;border:1px solid var(--red);color:var(--red)} .btn-red:hover{background:rgba(229,115,107,.12)}
  .btn:disabled{opacity:.45;cursor:not-allowed;transform:none;filter:none} .btn-sm{padding:7px 12px;font-size:13px}
  .hero{padding:64px 0 36px;text-align:center}
  .hero .eyebrow{color:var(--gold);font-weight:600;letter-spacing:.14em;text-transform:uppercase;font-size:12px}
  .hero h1{font-size:clamp(34px,6vw,58px);line-height:1.04;margin:14px auto 0;max-width:14ch} .hero h1 .accent{color:var(--gold)}
  .hero p.sub{color:var(--muted);max-width:54ch;margin:18px auto 28px;font-size:17px}
  .section-head{display:flex;align-items:baseline;justify-content:space-between;margin:8px 0 18px;gap:12px;flex-wrap:wrap}
  .section-head h2{font-size:22px} .section-head .hint{color:var(--muted);font-size:13px}
  .game-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:18px;padding-bottom:64px}
  .game-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;cursor:pointer;transition:.18s;display:flex;flex-direction:column}
  .game-card:hover{transform:translateY(-3px);border-color:var(--gold-dim);box-shadow:var(--shadow)}
  .game-card .thumb{aspect-ratio:3/2;background:var(--surface-2) center/cover no-repeat}
  .game-card .body{padding:14px 16px;display:flex;align-items:center;justify-content:space-between;gap:8px}
  .game-card .body h3{font-size:16px} .game-card .go{color:var(--gold);font-size:13px;font-weight:600}
  .gameview-head{display:flex;align-items:center;gap:16px;padding:28px 0 6px}
  .gameview-head .gthumb{width:84px;height:56px;border-radius:10px;background:var(--surface-2) center/cover;flex:none}
  .gameview-head h2{font-size:26px}
  .gameview-head .crumb{color:var(--muted);font-size:13px;cursor:pointer} .gameview-head .crumb:hover{color:var(--gold)}
  .tabs{display:flex;gap:4px;border-bottom:1px solid var(--border);margin:22px 0 24px}
  .tab{background:none;color:var(--muted);padding:12px 18px;font-weight:600;font-size:15px;border-bottom:2px solid transparent;margin-bottom:-1px}
  .tab.active{color:var(--gold);border-bottom-color:var(--gold)} .tab:hover{color:var(--text)}
  /* category nav + content layout */
  .gamebody{display:flex;gap:24px;align-items:flex-start;margin-bottom:60px}
  .catnav{width:212px;flex:none;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:14px;position:sticky;top:84px}
  .catnav h4{font-size:12px;text-transform:uppercase;letter-spacing:.12em;color:var(--muted);margin:0 0 10px 4px}
  .cat{display:flex;justify-content:space-between;align-items:center;gap:8px;width:100%;text-align:left;background:none;color:var(--muted);padding:9px 11px;border-radius:8px;font-size:14px;font-weight:500}
  .cat:hover{background:var(--surface-2);color:var(--text)}
  .cat.active{background:var(--gold-soft);color:var(--gold);font-weight:600}
  .cat .ct{font-size:12px;opacity:.7;font-family:'JetBrains Mono',monospace}
  .gamemain{flex:1;min-width:0}
  .toolbar{display:flex;gap:10px;margin-bottom:18px;flex-wrap:wrap}
  .search{flex:1;min-width:200px;display:flex;align-items:center;gap:8px;background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:0 14px}
  .search input{flex:1;background:none;border:none;color:var(--text);padding:12px 0;outline:none;font-size:15px} .search svg{color:var(--faint)}
  /* BIG image cards */

  .listing{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;display:flex;flex-direction:column;transition:.15s} .listing:hover{border-color:var(--gold-dim);transform:translateY(-2px)}

  .listing .info{padding:15px;display:flex;flex-direction:column;gap:8px;flex:1} .listing .info h3{font-size:18px;line-height:1.2}
  .listing .chars{color:var(--muted);font-size:13px;flex:1} .listing .notes{color:var(--faint);font-size:12px;font-style:italic}
  .listing .foot{display:flex;align-items:center;justify-content:space-between;gap:8px;margin-top:4px}
  .price{display:inline-flex;align-items:center;gap:6px;color:var(--gold);font-weight:700;font-size:16px}
  .price .coin{width:16px;height:16px;border-radius:50%;background:radial-gradient(circle at 32% 30%, #ffe9a8, var(--gold) 58%, var(--gold-dim))}
  .seller{color:var(--faint);font-size:12px}
  .addcard{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;min-height:200px;border:1px dashed var(--border);border-radius:var(--radius);color:var(--gold);cursor:pointer;background:var(--surface)} .addcard:hover{border-color:var(--gold-dim)}

  .feed{display:flex;flex-direction:column;gap:2px}
  .feed-row{display:flex;align-items:center;gap:14px;padding:13px 16px;background:var(--surface);border:1px solid var(--border);border-radius:10px}

  .feed-row .txt{flex:1;font-size:14px} .feed-row .txt .who{color:var(--muted)}
  .badge{font-size:11px;font-weight:700;padding:3px 9px;border-radius:999px;text-transform:uppercase;letter-spacing:.04em}

  .toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--surface-2);border:1px solid var(--border);color:var(--text);padding:13px 20px;border-radius:12px;box-shadow:var(--shadow);opacity:0;transition:.25s;z-index:200;max-width:90vw}

    .gamebody{flex-direction:column}
    .catnav{width:auto;position:static;display:flex;gap:8px;overflow-x:auto;padding:10px}
    .catnav h4{display:none}
    .cat{width:auto;flex:none;white-space:nowrap;border:1px solid var(--border)} .cat .ct{display:none}

<div id="setupBanner" class="setup-banner hidden">⚠ Can't reach the API. Make sure the Node server is running and <b>API_BASE</b> below points to it.</div>

<header class="topbar"><div class="wrap">
  <div class="brand" onclick="go('landing')"><span class="dot"></span>SwitchBored</div>
  <div class="grow"></div>
  <span id="greet" class="nav-greet hidden"></span>
  <button class="nav-link hide-sm" id="navMyTrades" onclick="go('mytrades')">My Trades<span id="pendingBadge" class="pending-badge hidden"></span></button>
  <span id="mgChip" class="mg-chip hidden"><span class="coin">MG</span><span class="mg-amt" id="mgAmount">0</span></span>
  <button class="nav-link hidden" id="navImport" onclick="runAdminImport()" style="color:var(--gold);font-size:12px">⟳ Re-import</button>
  <button class="nav-link" id="navAuth" onclick="openAuth()">Sign in</button>
  <button class="nav-link hidden" id="navLogout" onclick="logout()">Sign out</button>
</div></header>

<main id="app"></main>

<div class="overlay" id="authOverlay"><div class="modal">
  <div class="mhead"><h3 id="authTitle">Sign in</h3><button class="x" onclick="closeModal('authOverlay')">×</button></div>
  <div class="mbody">
    <div class="field" id="nameField"><label>Display name</label><input id="auName" placeholder="e.g. RuneHunter"></div>
    <div class="field"><label>Email</label><input id="auEmail" type="email" placeholder="you@example.com"></div>
    <div class="field"><label>Password</label><input id="auPass" type="password" placeholder="••••••••"></div>
    <button class="btn btn-gold" style="width:100%" id="authSubmit" onclick="submitAuth()">Sign in</button>
    <p class="muted" style="text-align:center;margin:14px 0 0;font-size:13px">
      <span id="authSwitchText">New to SwitchBored?</span>
      <a href="#" style="color:var(--gold);text-decoration:none" onclick="toggleAuthMode();return false" id="authSwitchLink">Create an account</a></p>
  </div>
</div></div>

<div class="overlay" id="modalOverlay"><div class="modal">
  <div class="mhead"><h3 id="modalTitle"></h3><button class="x" onclick="closeModal('modalOverlay')">×</button></div>
  <div class="mbody" id="modalBody"></div>
</div></div>

<div class="toast" id="toast"></div>

function getVarStats(productName){ return VARIABLE_STATS[productName] || []; }

function renderVarStatFields(productName){
  const stats = getVarStats(productName);
  if(!stats.length) return '';
  return `<div class="field" style="margin-top:12px">
    <label style="color:var(--gold);font-weight:600">⚡ Variable Stats — enter your item's actual rolled values</label>
    <div style="display:flex;flex-direction:column;gap:8px;margin-top:8px">
      ${stats.map(s=>`
        <div style="display:flex;align-items:center;gap:8px">
          <span style="flex:1;font-size:13px;color:var(--text)">${esc(s.label)}</span>
          <input id="varstat_${s.key}" type="number" min="${s.min}" max="${s.max}"
            placeholder="${s.min}–${s.max} ${s.unit}"
            style="width:90px;text-align:center"
            oninput="checkVarStat('${s.key}',${s.min},${s.max})">
          <span class="muted" style="font-size:12px;min-width:60px" id="varstat_err_${s.key}"></span>
        </div>`).join('')}
    </div></div>`;
}

function checkVarStat(key, min, max){
  const v = Number($('varstat_'+key).value);
  const err = $('varstat_err_'+key);
  if(!$('varstat_'+key).value){ err.textContent=''; return; }
  if(v < min || v > max){ err.textContent=`Must be ${min}–${max}`; err.style.color='var(--red)'; }
  else { err.textContent='✓'; err.style.color='var(--green)'; }
}

function collectVarStats(productName){
  const stats = getVarStats(productName);
  if(!stats.length) return null;
  const result = {};
  for(const s of stats){
    const el = $('varstat_'+s.key);
    if(!el) continue;
    const v = Number(el.value);
    if(el.value === '') continue; // optional
    if(v < s.min || v > s.max) throw new Error(`${s.label}: value must be between ${s.min} and ${s.max}`);
    result[s.key] = v;
  }
  return Object.keys(result).length ? result : null;
}

function formatVarStats(varStats, productName){
  if(!varStats) return '';
  const defs = getVarStats(productName);
  return Object.entries(varStats).map(([k,v])=>{
    const def = defs.find(d=>d.key===k);
    return def ? `${def.label}: <b>${v} ${def.unit}</b>` : `${k}: ${v}`;
  }).join(' · ');
}


async function req(method, path, body){
  const headers = {};
  if(body) headers['Content-Type'] = 'application/json';
  if(state.token) headers['Authorization'] = 'Bearer ' + state.token;
  let res;
  try{ res = await fetch(API_BASE + path, { method, headers, body: body ? JSON.stringify(body) : undefined }); }
  catch(e){ document.getElementById('setupBanner').classList.remove('hidden'); throw new Error('Could not reach the server.'); }
  let json=null; try{ json=await res.json(); }catch(e){}
  if(!res.ok) throw new Error((json && json.error) || ('Request failed ('+res.status+')'));
  return json;
}

const apiPost = (p,b) => req('POST', p, b||{});

function timeAgo(iso){ if(!iso) return ''; const d=(Date.now()-new Date(iso))/1000;
  if(d<60) return 'just now'; if(d<3600) return Math.floor(d/60)+'m ago'; if(d<86400) return Math.floor(d/3600)+'h ago'; return Math.floor(d/86400)+'d ago'; }
function debounce(fn,ms){ let h; return (...a)=>{ clearTimeout(h); h=setTimeout(()=>fn(...a),ms); }; }

  $('tabContent').innerHTML = `
    <div class="toolbar"><div class="search">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="m20 20-3-3"/></svg>
      <input id="sellSearch" placeholder="Search the catalog…" value="${esc(sellQuery)}"></div></div>
    <p class="muted" style="margin:-6px 0 16px;font-size:13px">Pick the item you own to list it for sale.</p>
    <div id="sellResults" class="cards"><div class="empty">Loading…</div></div>`;
  $('sellSearch').addEventListener('input', debounce(e=>{ sellQuery=e.target.value; fetchCatalog(); },200));
  fetchCatalog();
}
async function fetchCatalog(){
  try{
    const rows = await apiGet(`/games/${state.game.id}/products?q=`+encodeURIComponent(sellQuery)+catQS());
    const addCard = `<div class="addcard" onclick="showAddProduct()"><div class="plus">＋</div><div>Add a new item</div></div>`;
    $('sellResults').innerHTML = addCard + rows.map(p=>`
      <div class="listing">
        <div class="img" style="background-image:url('${esc(p.image)}')"></div>
        <div class="info">
          <h3>${esc(p.name)}</h3>
          <div class="chars">${esc(p.characteristics||'')}</div>
          <div class="foot"><span class="muted" style="font-size:13px">in-game ${fmt(p.costInGame)}</span></div>
          <button class="btn btn-ghost btn-sm" style="width:100%;margin-top:4px" onclick='showListForm(${j({id:p.id,name:p.name,costInGame:p.costInGame,maxMarketGold:p.maxMarketGold,characteristics:p.characteristics})})'>List for sale</button>
        </div></div>`).join('');
  }catch(e){ $('sellResults').innerHTML='<div class="empty">'+esc(e.message)+'</div>'; }
}
function showListForm(p){
  $('modalTitle').textContent = 'List "'+p.name+'"';
  $('modalBody').innerHTML = `
    ${p.characteristics ? `<div style="background:rgba(255,255,255,.04);border-radius:8px;padding:10px 12px;margin-bottom:12px;font-size:12px;color:var(--muted);line-height:1.6">${esc(p.characteristics)}</div>` : ''}
    <div class="field"><label>Price in Market Gold</label>
      <input id="mgPrice" type="number" placeholder="e.g. 800" oninput="checkPrice()">
      <div class="help" id="priceHelp"></div></div>
    ${renderVarStatFields(p.name)}
    <div class="field">
      <label>Custom stats <span class="muted" style="font-weight:400;font-size:12px">— add specific rolls on your copy (optional)</span></label>
      <div id="customStats"></div>
      <button class="btn btn-ghost btn-sm" style="margin-top:6px" onclick="addCustomStat()">+ Add stat</button>
    </div>
    <div class="field"><label>Extra notes (optional)</label><textarea id="itemNotes" rows="2" placeholder="Any other info for the buyer"></textarea></div>
    <button class="btn btn-gold" style="width:100%" id="listBtn" onclick='submitListing("${p.id}",${j(p.name)})'>List for sale</button>`;
  $('modalOverlay').classList.add('show');
}
function checkPrice(){ const v=Number($('mgPrice').value), h=$('priceHelp'), b=$('listBtn');
  if(v<=0||!$('mgPrice').value){ h.innerHTML=''; b.disabled=true; }
  else { h.innerHTML=''; b.disabled=false; } }

let customStatCount = 0;
function addCustomStat(){
  customStatCount++;
  const id = 'cs_'+customStatCount;
  const div = document.createElement('div');
  div.id = id;
  div.style.cssText = 'display:flex;gap:6px;align-items:center;margin-top:6px';
  div.innerHTML = `<input placeholder="Stat name (e.g. +Max Damage)" style="flex:2" id="${id}_label">
    <input placeholder="Value" style="flex:1" id="${id}_value">
    <button class="btn btn-ghost btn-sm" onclick="document.getElementById('${id}').remove()">✕</button>`;
  $('customStats').appendChild(div);
}

function collectCustomStats(){
  const stats = [];
  $('customStats').querySelectorAll('[id^="cs_"]').forEach(row => {
    const idBase = row.id;
    const label = document.getElementById(idBase+'_label')?.value.trim();
    const value = document.getElementById(idBase+'_value')?.value.trim();
    if(label && value) stats.push({ label, value });
  });
  return stats.length ? stats : null;
}
async function submitListing(productId, productName){
  const mg=Math.floor(Number($('mgPrice').value));
  if(!(mg>0)) return toast('Enter a price','err');
  let varStats;
  try{ varStats = collectVarStats(productName); }
  catch(e){ return toast(e.message,'err'); }
  const customStats = collectCustomStats();
  const manualNotes = $('itemNotes').value.trim();
  const itemNotes = manualNotes || null;
  try{ const r=await apiPost(`/games/${state.game.id}/listings`,{ productId, marketGold:mg, itemNotes, varStats, customStats });
    if(r && typeof r.marketGold==='number'){ state.user.marketGold=r.marketGold; refreshAuthUI(); }
    closeModal('modalOverlay'); toast('Listed — '+fmt(mg)+' MG added to your wallet','ok');
    buyQuery=''; state.category=''; renderCatnav(); setGameTab('buy');
  }catch(e){ toast(e.message,'err'); }
}
function showAddProduct(){
  $('modalTitle').textContent='Add a new item';
  $('modalBody').innerHTML = `
    <div class="field"><label>Item name</label><input id="npName" placeholder="e.g. Grief Phase Blade"></div>
    <div class="field"><label>Characteristics</label><input id="npChars" placeholder="e.g. +35% IAS, +damage"></div>
    <div class="row2"><div class="field"><label>In-game cost</label><input id="npCost" type="number" placeholder="e.g. 5000"></div>
      <div class="field"><label>Image URL (optional)</label><input id="npImg" placeholder="https://…"></div></div>
    <button class="btn btn-gold" style="width:100%" onclick="submitNewProduct()">Add item</button>`;
  $('modalOverlay').classList.add('show');
}
async function submitNewProduct(){
  const name=$('npName').value.trim(), cost=Number($('npCost').value);
  if(!name) return toast('Item name is required','err'); if(!(cost>0)) return toast('Enter a valid in-game cost','err');
  try{ await apiPost(`/games/${state.game.id}/products`,{ name, characteristics:$('npChars').value.trim(), costInGame:cost, imageUrl:$('npImg').value.trim() });
    closeModal('modalOverlay'); toast('Added to catalog','ok'); state.categories = await apiGet(`/games/${state.game.id}/categories`); renderCatnav(); fetchCatalog();
  }catch(e){ toast(e.message,'err'); }
}

/* ---- activity ---- */
async function drawActivity(){
  try{
    const rows = await apiGet(`/games/${state.game.id}/activity?1=1`+catQS());
    $('tabContent').innerHTML = rows.length ? `<div class="feed">`+rows.map(t=>`
      <div class="feed-row">
        <div class="ico" style="background-image:url('${esc(t.image)}')"></div>
        <div class="txt"><b>${esc(t.productName)}</b> <span class="who">— ${esc(t.sellerName)} ${esc(t.verb)}</span>
          <span class="muted"> · ${timeAgo(t.buyerTimestamp||t.sellerTimestamp)}</span></div>
        ${coin(t.marketGold)}<span class="badge ${badgeClass(t.status)}">${esc(t.status)}</span>
      </div>`).join('')+`</div>`
      : '<div class="empty"><div class="big">No activity yet</div>List or buy something to get things moving.</div>';
  }catch(e){ $('tabContent').innerHTML='<div class="empty">'+esc(e.message)+'</div>'; }
}

/* ---- my trades ---- */
async function renderMyTrades(){
  if(!requireLogin()){ $('app').innerHTML=''; return; }
  $('app').innerHTML=`<div class="wrap"><div class="gameview-head"><div><div class="crumb" onclick="go('landing')">← Home</div><h2>My Trades</h2></div></div><div id="mtContent"><div class="empty">Loading…</div></div></div>`;
  try{
    const d = await apiGet('/me/trades');
    const sec=(title,rows,isSeller)=>`<div class="section-head" style="margin-top:26px"><h2>${title}</h2></div>`+
      (rows.length? '<div class="feed">'+rows.map(t=>tradeRow(t,isSeller)).join('')+'</div>' : '<div class="empty">Nothing here yet.</div>');
    $('mtContent').innerHTML = sec('Selling', d.selling, true) + sec('Buying', d.buying, false);
  }catch(e){ $('mtContent').innerHTML='<div class="empty">'+esc(e.message)+'</div>'; }
}
function tradeRow(t,isSeller){
  let action='';
  if(isSeller && t.status==='In Progress') action=`<button class="btn btn-green btn-sm" onclick="markDelivered('${t.id}')">Mark delivered</button>`;
  else if(isSeller && t.status==='Open') action=`<button class="btn btn-red btn-sm" onclick="cancelTrade('${t.id}')">Cancel</button>`;
  else if(!isSeller && t.status==='In Progress') action=`<span class="muted" style="font-size:12px">Awaiting delivery…</span>`;
  else if(!isSeller && t.status==='Delivered') action=`<button class="btn btn-green btn-sm" onclick="confirmArrival('${t.id}')">Item arrived ✓</button>`;
  else if(isSeller && t.status==='Delivered') action=`<span class="muted" style="font-size:12px">Waiting for buyer to confirm arrival</span>`;
  const extra = isSeller && t.status==='In Progress' && t.buyerInGameName ? `· deliver to: ${esc(t.buyerInGameName)}` : '';
  return `<div class="feed-row">
    <div class="ico" style="background-image:url('${esc(t.image)}')"></div>
    <div class="txt"><b>${esc(t.productName)}</b> <span class="muted">· ${esc(t.gameName)}</span><br>
      <span class="muted" style="font-size:12px">${timeAgo(t.buyerTimestamp||t.sellerTimestamp)} ${extra}</span></div>
    ${coin(t.marketGold)}<span class="badge ${badgeClass(t.status)}">${esc(t.status)}</span>${action}
  </div>`;
}
async function markDelivered(id){ try{ await apiPost(`/trades/${id}/deliver`); state.user=await apiGet('/me'); refreshAuthUI(); toast('Marked as delivered — waiting for buyer to confirm','ok'); renderMyTrades(); updatePendingBadge(); }catch(e){ toast(e.message,'err'); } }
async function confirmArrival(id){ try{ await apiPost(`/trades/${id}/confirm`); state.user=await apiGet('/me'); refreshAuthUI(); toast('Item arrival confirmed — trade complete!','ok'); renderMyTrades(); updatePendingBadge(); }catch(e){ toast(e.message,'err'); } }
async function runAdminImport(){
  if(!confirm('This will delete ALL current listings and re-import 1,184 items from scratch. Continue?')) return;
  try{
    toast('Running import — this may take a few seconds...','ok');
    const r = await apiPost('/api/admin/import', {});
    toast(r.message || 'Import complete!', 'ok');
    // Reload the page to show fresh data
    setTimeout(() => location.reload(), 1500);
  } catch(e){ toast('Import failed: '+e.message,'err'); }
}

async function cancelTrade(id){ try{ await apiPost(`/trades/${id}/cancel`); state.user=await apiGet('/me'); refreshAuthUI(); toast('Trade cancelled','ok'); renderMyTrades(); updatePendingBadge(); }catch(e){ toast(e.message,'err'); } }

applyAuthMode(); render();
</script>
</body>
</html>
